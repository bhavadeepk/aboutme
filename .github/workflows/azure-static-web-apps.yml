# ─── CI/CD – Azure Static Web App ────────────────────────────────────────────
# Triggers:
#   push to main   → provision infra (Bicep) + deploy site
#   pull_request   → deploy preview environment
#   PR closed      → tear down preview environment
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS          – JSON output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_SUBSCRIPTION_ID      – Target Azure subscription
#   AZURE_RESOURCE_GROUP       – Resource group to deploy into (must already exist)
#   AZURE_STATIC_WEB_APPS_API_TOKEN – Deployment token from the Static Web App resource
#                                     (az staticwebapp secrets list --name <swa-name>)

name: Azure Static Web App CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # allows the action to post a preview URL comment

jobs:
  # ── 1. Provision Infrastructure (main branch only) ─────────────────────────
  provision-infra:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: infra/main.bicepparam
          failOnStdErr: false

  # ── 2. Build & Deploy Site ─────────────────────────────────────────────────
  deploy-site:
    name: Build and Deploy Site
    runs-on: ubuntu-latest
    needs: []   # runs independently; PR previews don't need infra provisioning
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "."        # root of the site
          output_location: "."     # no build step needed – files are already static
          skip_app_build: true   # plain HTML/CSS/JS – no npm build required

  # ── 3. Tear Down PR Preview ─────────────────────────────────────────────────
  close-pr-preview:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
